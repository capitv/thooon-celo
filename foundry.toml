[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
evm_version = "paris"

[rpc_endpoints]
celo = "https://forno.celo.org"
celo_sepolia = "https://forno.celo-sepolia.celo-testnet.org"

# Verificação padrão: Sourcify (sem API key). Para Celoscan, passe
# --etherscan-api-key e --verifier-url https://api.celoscan.io/api na CLI.
